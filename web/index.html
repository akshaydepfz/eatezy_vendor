<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eatezy_vendor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>eatezy_vendor</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Safari/iOS: force WebGL 1 fallback (CanvasKit WebGL 2 has issues on WebKit) -->
  <script>
    (function() {
      var ua = navigator.userAgent;
      var isWebKit = ua.indexOf('Safari') !== -1 && ua.indexOf('Chrome') === -1 || ua.indexOf('CriOS') !== -1;
      if (isWebKit) {
        var orig = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type) {
          if (type === 'webgl2') return orig.call(this, 'webgl', arguments[1]);
          return orig.apply(this, arguments);
        };
      }
    })();
  </script>
  <style>
    html, body { margin: 0; min-height: 100vh; min-height: -webkit-fill-available; }
    #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; min-height: 100vh; min-height: -webkit-fill-available; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; font-family: system-ui; color: #333; z-index: 9999; padding: 24px; text-align: center; box-sizing: border-box; }
    #loading-fallback { display: none; margin-top: 20px; max-width: 400px; }
    #error-message { color: #c62828; margin-bottom: 16px; font-size: 14px; word-break: break-word; }
    #retry-btn { padding: 12px 24px; font-size: 16px; background: #0175C2; color: #fff; border: none; border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 44px; }
  </style>
  <div id="loading">
    <span id="loading-text" style="font-size:18px;">Loading...</span>
    <div id="loading-fallback">
      <p id="error-message"></p>
      <button id="retry-btn" onclick="location.reload()">Try Again</button>
    </div>
  </div>
  <script>
    (function() {
      window.loadError = null;
      window.onerror = function(msg, url, line, col, err) {
        window.loadError = msg || (err && err.message) || 'Unknown error';
        if (err && err.stack) window.loadError += ' (' + err.stack.split('\n')[0] + ')';
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.loadError = (e.reason && (e.reason.message || String(e.reason))) || 'Promise rejected';
      });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function() {
      var loading = document.getElementById('loading');
      var loadingText = document.getElementById('loading-text');
      var fallback = document.getElementById('loading-fallback');
      var errorMsg = document.getElementById('error-message');
      var script = document.querySelector('script[src*="flutter_bootstrap"]');
      if (script) {
        script.onerror = function() {
          window.loadError = 'Failed to load app script. Check your network connection.';
        };
      }
      window.addEventListener('error', function(e) {
        if (e.message) window.loadError = e.message;
      }, true);
      function checkLoaded() {
        return document.querySelector('canvas') && document.querySelector('canvas').width > 0;
      }
      function showFallback() {
        if (!checkLoaded() && loading && fallback && errorMsg) {
          if (loadingText) loadingText.style.display = 'none';
          errorMsg.textContent = window.loadError || 'Failed to load. Please check your connection and try again.';
          fallback.style.display = 'block';
        } else if (loading) {
          loading.style.display = 'none';
        }
      }
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      var timeoutMs = isIOS ? 6000 : 8000;
      var hideInterval = setInterval(function() {
        if (checkLoaded()) {
          clearInterval(hideInterval);
          if (loading) loading.style.display = 'none';
        }
      }, 300);
      setTimeout(function() {
        clearInterval(hideInterval);
        showFallback();
      }, timeoutMs);
    })();
  </script>
</body>
</html>
