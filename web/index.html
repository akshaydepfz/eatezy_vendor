<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="eatezy_vendor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>eatezy_vendor</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Safari/iOS: force WebGL 1 fallback (CanvasKit WebGL 2 has issues on WebKit) -->
  <script>
    (function() {
      var ua = navigator.userAgent;
      var isWebKit = ua.indexOf('Safari') !== -1 && ua.indexOf('Chrome') === -1 || ua.indexOf('CriOS') !== -1;
      if (isWebKit) {
        var orig = HTMLCanvasElement.prototype.getContext;
        HTMLCanvasElement.prototype.getContext = function(type) {
          if (type === 'webgl2') return orig.call(this, 'webgl', arguments[1]);
          return orig.apply(this, arguments);
        };
      }
    })();
  </script>
  <div id="loading" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;font-family:system-ui;color:#333;z-index:9999;padding:24px;text-align:center;">
    <span id="loading-text" style="font-size:18px;">Loading...</span>
    <div id="loading-fallback" style="display:none;margin-top:20px;">
      <p style="color:#666;margin-bottom:16px;">Having trouble loading? Try:</p>
      <button onclick="location.reload()" style="padding:12px 24px;font-size:16px;background:#0175C2;color:#fff;border:none;border-radius:8px;cursor:pointer;">Refresh</button>
      <p style="color:#999;font-size:14px;margin-top:16px;">Or clear Safari cache: Settings → Safari → Clear History and Website Data</p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function() {
      var loading = document.getElementById('loading');
      var loadingText = document.getElementById('loading-text');
      var fallback = document.getElementById('loading-fallback');
      function checkLoaded() {
        return document.querySelector('canvas') && document.querySelector('canvas').width > 0;
      }
      var hideInterval = setInterval(function() {
        if (checkLoaded()) {
          clearInterval(hideInterval);
          if (loading) loading.style.display = 'none';
        }
      }, 300);
      setTimeout(function() {
        clearInterval(hideInterval);
        if (!checkLoaded() && loading && fallback) {
          if (loadingText) loadingText.style.display = 'none';
          fallback.style.display = 'block';
        } else if (loading) {
          loading.style.display = 'none';
        }
      }, 8000);
    })();
  </script>
</body>
</html>
